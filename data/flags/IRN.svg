<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <!-- Three horizontal stripes -->
  <rect width="900" height="200" fill="#239f40"/>
  <rect y="200" width="900" height="200" fill="#ffffff"/>
  <rect y="400" width="900" height="200" fill="#da0000"/>

  <!-- Gold border bands -->
  <rect y="194" width="900" height="12" fill="#c8a400"/>
  <rect y="394" width="900" height="12" fill="#c8a400"/>

  <!-- Sun rays (24 rays) -->
  <g transform="translate(450,288)">
    <g fill="#c8a400">
      <!-- Long rays (every 30°) -->
      <polygon points="0,-160 -8,-110 8,-110" transform="rotate(0)"/>
      <polygon points="0,-160 -8,-110 8,-110" transform="rotate(30)"/>
      <polygon points="0,-160 -8,-110 8,-110" transform="rotate(60)"/>
      <polygon points="0,-160 -8,-110 8,-110" transform="rotate(90)"/>
      <polygon points="0,-160 -8,-110 8,-110" transform="rotate(120)"/>
      <polygon points="0,-160 -8,-110 8,-110" transform="rotate(150)"/>
      <polygon points="0,-160 -8,-110 8,-110" transform="rotate(180)"/>
      <polygon points="0,-160 -8,-110 8,-110" transform="rotate(210)"/>
      <polygon points="0,-160 -8,-110 8,-110" transform="rotate(240)"/>
      <polygon points="0,-160 -8,-110 8,-110" transform="rotate(270)"/>
      <polygon points="0,-160 -8,-110 8,-110" transform="rotate(300)"/>
      <polygon points="0,-160 -8,-110 8,-110" transform="rotate(330)"/>
      <!-- Short rays (offset 15°) -->
      <polygon points="0,-130 -5,-98 5,-98" transform="rotate(15)"/>
      <polygon points="0,-130 -5,-98 5,-98" transform="rotate(45)"/>
      <polygon points="0,-130 -5,-98 5,-98" transform="rotate(75)"/>
      <polygon points="0,-130 -5,-98 5,-98" transform="rotate(105)"/>
      <polygon points="0,-130 -5,-98 5,-98" transform="rotate(135)"/>
      <polygon points="0,-130 -5,-98 5,-98" transform="rotate(165)"/>
      <polygon points="0,-130 -5,-98 5,-98" transform="rotate(195)"/>
      <polygon points="0,-130 -5,-98 5,-98" transform="rotate(225)"/>
      <polygon points="0,-130 -5,-98 5,-98" transform="rotate(255)"/>
      <polygon points="0,-130 -5,-98 5,-98" transform="rotate(285)"/>
      <polygon points="0,-130 -5,-98 5,-98" transform="rotate(315)"/>
      <polygon points="0,-130 -5,-98 5,-98" transform="rotate(345)"/>
    </g>
  </g>

  <!-- Sun circle (outer ring) -->
  <circle cx="450" cy="288" r="100" fill="#c8a400"/>
  <!-- Sun face -->
  <circle cx="450" cy="288" r="82" fill="#d4af37"/>

  <!-- Sun face features -->
  <ellipse cx="428" cy="278" rx="8" ry="9" fill="#7a5c00"/>
  <ellipse cx="472" cy="278" rx="8" ry="9" fill="#7a5c00"/>
  <path d="M 430 300 Q 450 318 470 300" stroke="#7a5c00" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Eyebrows -->
  <path d="M 420 268 Q 428 263 436 267" stroke="#7a5c00" stroke-width="3" fill="none"/>
  <path d="M 464 267 Q 472 263 480 268" stroke="#7a5c00" stroke-width="3" fill="none"/>
  <!-- Nose -->
  <ellipse cx="450" cy="293" rx="4" ry="3" fill="#7a5c00"/>

  <!-- Lion body -->
  <ellipse cx="445" cy="372" rx="88" ry="42" fill="#c8a400" transform="rotate(-3,445,372)"/>

  <!-- Lion hindquarters (raised) -->
  <ellipse cx="362" cy="348" rx="32" ry="40" fill="#c8a400" transform="rotate(20,362,348)"/>

  <!-- Lion neck -->
  <ellipse cx="528" cy="342" rx="22" ry="28" fill="#c8a400" transform="rotate(-15,528,342)"/>

  <!-- Lion mane (ring of petals) -->
  <g transform="translate(548,308)">
    <ellipse rx="20" ry="9" fill="#9a7000" transform="rotate(0) translate(0,-32)"/>
    <ellipse rx="20" ry="9" fill="#9a7000" transform="rotate(30) translate(0,-32)"/>
    <ellipse rx="20" ry="9" fill="#9a7000" transform="rotate(60) translate(0,-32)"/>
    <ellipse rx="20" ry="9" fill="#9a7000" transform="rotate(90) translate(0,-32)"/>
    <ellipse rx="20" ry="9" fill="#9a7000" transform="rotate(120) translate(0,-32)"/>
    <ellipse rx="20" ry="9" fill="#9a7000" transform="rotate(150) translate(0,-32)"/>
    <ellipse rx="20" ry="9" fill="#9a7000" transform="rotate(180) translate(0,-32)"/>
    <ellipse rx="20" ry="9" fill="#9a7000" transform="rotate(210) translate(0,-32)"/>
    <ellipse rx="20" ry="9" fill="#9a7000" transform="rotate(240) translate(0,-32)"/>
    <ellipse rx="20" ry="9" fill="#9a7000" transform="rotate(270) translate(0,-32)"/>
    <ellipse rx="20" ry="9" fill="#9a7000" transform="rotate(300) translate(0,-32)"/>
    <ellipse rx="20" ry="9" fill="#9a7000" transform="rotate(330) translate(0,-32)"/>
  </g>

  <!-- Lion head -->
  <circle cx="548" cy="308" r="38" fill="#c8a400"/>

  <!-- Lion face -->
  <ellipse cx="536" cy="304" rx="6" ry="7" fill="#7a5c00"/>
  <ellipse cx="560" cy="304" rx="6" ry="7" fill="#7a5c00"/>
  <path d="M 538 320 Q 548 326 558 320" stroke="#7a5c00" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <ellipse cx="548" cy="315" rx="5" ry="3.5" fill="#7a5c00"/>
  <!-- Whisker marks -->
  <path d="M 525 313 L 510 310 M 525 317 L 510 320" stroke="#9a7000" stroke-width="1.5" fill="none"/>
  <path d="M 570 313 L 585 310 M 570 317 L 585 320" stroke="#9a7000" stroke-width="1.5" fill="none"/>

  <!-- Lion ear -->
  <path d="M 548 272 L 538 258 L 556 262 Z" fill="#b89400"/>

  <!-- Tail (curling up from hindquarters) -->
  <path d="M 358 352 Q 325 338 318 310 Q 312 282 335 272 Q 348 267 352 282"
        stroke="#c8a400" stroke-width="13" fill="none" stroke-linecap="round"/>
  <!-- Tail tuft -->
  <ellipse cx="352" cy="282" rx="14" ry="9" fill="#9a7000" transform="rotate(-20,352,282)"/>

  <!-- Hind legs -->
  <path d="M 370 408 L 362 440 Q 358 452 368 455 Q 378 452 375 440 L 375 408 Z" fill="#b89400"/>
  <path d="M 408 408 L 402 440 Q 398 452 408 455 Q 418 452 416 440 L 414 408 Z" fill="#b89400"/>

  <!-- Front legs (one raised with sword, one on ground) -->
  <!-- Ground front leg -->
  <path d="M 482 408 L 478 440 Q 474 452 484 455 Q 494 452 492 440 L 490 408 Z" fill="#b89400"/>
  <!-- Raised front leg/arm holding sword -->
  <path d="M 516 376 Q 530 350 538 320" stroke="#c8a400" stroke-width="16" fill="none" stroke-linecap="round"/>
  <!-- Paw holding sword -->
  <ellipse cx="540" cy="316" rx="14" ry="11" fill="#c8a400"/>

  <!-- Sword -->
  <rect x="556" y="180" width="6" height="130" rx="2" fill="#c0c0c0"/>
  <!-- Crossguard -->
  <rect x="542" y="268" width="34" height="6" rx="2" fill="#c8a400"/>
  <!-- Pommel -->
  <ellipse cx="559" cy="178" rx="8" ry="6" fill="#c8a400"/>
  <!-- Sword shine -->
  <line x1="558" y1="188" x2="558" y2="295" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
</svg>
